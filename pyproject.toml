[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = [
  ".git",
  ".venv",
  "venv",
  "node_modules",
  "uploads",
  "storage/uploads",
  "test-results",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
