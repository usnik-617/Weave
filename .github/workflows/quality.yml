name: quality

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt black

      - name: Install Node deps
        run: npm ci

      - name: Static/root sync drift check
        run: |
          npm run check:sync-static-root || (echo 'Static/root drift detected. Changed files:'; git --no-pager diff --name-only -- index.html static/index.html styles.css static/styles.css js/app-core.js static/js/app-core.js js/app-main.js static/js/app-main.js js/app-auth-init.js static/js/app-auth-init.js js/app-navigation-init.js static/js/app-navigation-init.js js/app-admin-init.js static/js/app-admin-init.js js/app-site-editor-config.js static/js/app-site-editor-config.js js/app-site-editor-core.js static/js/app-site-editor-core.js js/app-site-editor-sanitize.js static/js/app-site-editor-sanitize.js; echo 'Mirror hash diagnostics:'; sha256sum index.html static/index.html styles.css static/styles.css js/app-core.js static/js/app-core.js js/app-main.js static/js/app-main.js js/app-auth-init.js static/js/app-auth-init.js js/app-navigation-init.js static/js/app-navigation-init.js || true; exit 1)

      - name: Brand contrast check
        run: npm run check:brand-contrast

      - name: Cache strategy contract check
        run: npm run check:cache-strategy

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium webkit

      - name: Black check
        run: python -m black --check weave app.py wsgi.py models.py db_repository.py

      - name: Playwright smoke (core)
        run: npx playwright test tests/routing-smoke.spec.js tests/auth-and-write.spec.js tests/notice-calendar-link.spec.js --reporter=line

      - name: Playwright smoke (responsive)
        run: npx playwright test tests/responsive-layout.spec.js --project=chromium --project=webkit-mobile --reporter=line

      - name: Playwright smoke (api errors)
        run: npx playwright test tests/api-error-cases.spec.js --project=chromium --reporter=line

      - name: Playwright smoke (service worker refresh)
        run: npx playwright test tests/sw-cache-refresh.spec.js --project=chromium --reporter=line
