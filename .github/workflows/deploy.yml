name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      WEAVE_SECRET_KEY: ${{ secrets.WEAVE_SECRET_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=line

      - name: Build Docker image
        run: docker build -t weave:${{ github.sha }} .

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-build]
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE }}
            docker stop weave || true
            docker rm weave || true
            docker run -d --name weave --restart unless-stopped \
              -p 80:5000 \
              -e WEAVE_SECRET_KEY='${{ secrets.WEAVE_SECRET_KEY }}' \
              -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              -e SMTP_HOST='${{ secrets.SMTP_HOST }}' \
              -e SMTP_PORT='${{ secrets.SMTP_PORT }}' \
              -e SMTP_USER='${{ secrets.SMTP_USER }}' \
              -e SMTP_PASSWORD='${{ secrets.SMTP_PASSWORD }}' \
              -e SMTP_FROM='${{ secrets.SMTP_FROM }}' \
              ${{ env.IMAGE }}
